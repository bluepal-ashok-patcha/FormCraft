spring:
  application:
    name: formcraft-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/formcraft}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:ashok}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:your-email@gmail.com}
    password: ${SMTP_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  file:
    name: logs/formcraft.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [ID: %X{correlationId}] [Who: %X{username}] - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [ID: %X{correlationId}] [Who: %X{username}] - %msg%n"

app:
  jwt-secret: "daf66e01593f39ad35b44ca18a442751745465e9c0634606f731190978642091" # Placeholder 256-bit secret
  jwt-expiration-milliseconds: 3600000
  jwt-refresh-expiration-milliseconds: 86400000 # 24 hours
  otp-expiration-minutes: 5
  max-failed-attempts: 5
  lockout-duration-minutes: 15
  frontend-url: "http://localhost:5173"

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:your-cloud-name}
  api-key: ${CLOUDINARY_API_KEY:your-api-key}
  api-secret: ${CLOUDINARY_API_SECRET:your-api-secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

gemini:
  api:
    key: ${GEMINI_API_KEY:AIzaSyAFVqossamwed-euwzfV73Tbl_ccOE3esO4}
  endpoint:
    health:
      show-details: always